  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA-E-IN6185ruhUb-TB9LkDyK5xJayLBxU",
      authDomain: "nunuquest.firebaseapp.com",
      projectId: "nunuquest",
      storageBucket: "nunuquest.firebasestorage.app",
      messagingSenderId: "374919361286",
      appId: "1:374919361286:web:64108f0715eaa69f956487"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUserId = sessionStorage.getItem('nunuUserId');

    window.addMic = async function() {
      if (!currentUserId) return false;
      try {
        const ref = doc(db, 'users', currentUserId);
        const snap = await getDoc(ref);
        if (snap.exists()) {
          await updateDoc(ref, {
            'danang.mic': increment(1),
            'danang.loud_monkey_count': increment(1)
          });
        } else {
          await setDoc(ref, {
            danang: { mic: 1, loud_monkey_count: 1 }
          }, { merge: true });
        }
        return true;
      } catch(e) { return false; }
    };

    window.getMic = async function() {
      if (!currentUserId) return 0;
      try {
        const snap = await getDoc(doc(db, 'users', currentUserId));
        return snap.exists() ? (snap.data()?.danang?.mic || 0) : 0;
      } catch(e) { return 0; }
    };

    window.getNickname = async function() {
      if (!currentUserId) return null;
      try {
        const ref = doc(db, 'users', currentUserId);
        const snap = await getDoc(ref);
        if (snap.exists()) {
          return snap.data()?.nickname || null;
        }
        return null;
      } catch(e) {
        return null;
      }
    };
  </script>

<script>
// ──────────────────────────────────────────
// 常數
// ──────────────────────────────────────────
const BASE_IMG = 'https://nuniverseland.github.io/nunuquest/assets/danang/';
const NUNU_IMGS = {
  normal: BASE_IMG + 'nunu_normal.png',
  happy:  BASE_IMG + 'nunu_happy.png',
  sad:    BASE_IMG + 'nunu_sad.png',
};
const MONKEY_IMGS = {
  normal: BASE_IMG + 'monkey_loud_normal.png',
  happy:  BASE_IMG + 'monkey_loud_happy.png',
  sad:    BASE_IMG + 'monkey_loud_sad.png',
};

const SIZES = [0.5, 0.75, 1.0, 1.35, 1.7];

const CORRECT_DIALOGS = [
  '欸？！你真的會拼！',
  '運氣好而已啦！',
  '下一題你就不行了！',
  '才一題而已！',
];
const WRONG_DIALOGS = [
  '哈哈！這都不會！',
  '太簡單了吧！',
  '再來！再來！',
  '嘴砲猴：1，努努：0！',
];

// ──────────────────────────────────────────
// 遊戲狀態
// ──────────────────────────────────────────
let allQuestions = [];
let questions = [];
let maxRounds = 10;
let currentRound = 0;
const retriedWords = new Set(); // 每個錯題只重考一次

let nunuSizeIdx = 2;
let loudSizeIdx = 2;

let dialogTimer = null;
let imageTimer = null;
let isProcessing = false;

// ──────────────────────────────────────────
// Audio (Web Audio API)
// ──────────────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freqs, type = 'sine', interval = 0.12, duration = 0.25, gain = 0.28) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g);
      g.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now + i * interval);
      g.gain.setValueAtTime(gain, now + i * interval);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * interval + duration);
      osc.start(now + i * interval);
      osc.stop(now + i * interval + duration);
    });
  } catch(e) {}
}

function playSound(type) {
  switch(type) {
    case 'correct':
      playTone([523, 659, 784], 'sine', 0.1, 0.2);
      break;
    case 'wrong':
      playTone([400, 300], 'sawtooth', 0.15, 0.25, 0.22);
      break;
    case 'size_up':
      playTone([180], 'triangle', 0, 0.35, 0.3);
      break;
    case 'size_down':
      playTone([600, 500, 400], 'sine', 0.08, 0.15, 0.2);
      break;
    case 'win':
      playTone([523, 659, 784, 1047], 'sine', 0.12, 0.3);
      break;
    case 'lose':
      playTone([400, 350, 280, 220], 'triangle', 0.15, 0.35, 0.25);
      break;
  }
}

// ──────────────────────────────────────────
// TTS
// ──────────────────────────────────────────
function speak(word) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.0;
  speechSynthesis.speak(utter);
}

function replayTTS() {
  if (questions[currentRound]) {
    speak(questions[currentRound].tts || questions[currentRound].word);
  }
}

// ──────────────────────────────────────────
// 載入題目
// ──────────────────────────────────────────
async function loadQuestions() {
  const url = 'https://nuniverseland.github.io/nunuquest/data/spelling_battle.json';
  const res = await fetch(url, { cache: 'no-cache' });
  if (!res.ok) throw new Error('fetch failed');
  const data = await res.json();
  return data;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ──────────────────────────────────────────
// 初始化
// ──────────────────────────────────────────
async function init() {
  // 顯示 nickname
  const tag = document.getElementById('nicknameTag');
  if (typeof window.getNickname === 'function') {
    const nick = await window.getNickname();
    tag.textContent = nick ? `🐒 ${nick}` : '🐒 挑戰者';
  } else {
    tag.textContent = '🐒 挑戰者';
  }

  const minWait = new Promise(r => setTimeout(r, 1000));

  let raw = [];
  try {
    raw = await loadQuestions();
  } catch(e) {
    console.error('題目載入失敗:', e);
    document.getElementById('loadingStatus').textContent = '題目載入失敗，請重新整理';
    return;
  }

  await minWait;

  allQuestions = shuffle(raw);
  questions = allQuestions.slice(0, 10);
  maxRounds = 10;

  document.getElementById('loadingStatus').textContent = '準備好了！';
  document.getElementById('startBtn').style.display = 'block';
}

function startGame() {
  document.getElementById('loadingOverlay').classList.add('hidden');
  renderQuestion();
  // Speak first question (triggered by user click — iOS safe)
  speak(questions[0].tts || questions[0].word);
  document.getElementById('spellInput').focus();
}

// ──────────────────────────────────────────
// 渲染題目
// ──────────────────────────────────────────
function renderQuestion() {
  const q = questions[currentRound];

  // Round badge
  const roundBadge = document.getElementById('roundBadge');
  if (currentRound >= 10) {
    roundBadge.textContent = '⚡ 延長賽！';
  } else {
    roundBadge.textContent = `ROUND ${currentRound + 1} / 10`;
  }

  // Sentence with ___
  const sentence = q.sentence;
  const sentenceEl = document.getElementById('sentenceText');
  // Replace ___ with styled span
  const parts = sentence.split('___');
  if (parts.length >= 2) {
    sentenceEl.innerHTML =
      escapeHtml(parts[0]) +
      '<span class="blank">___</span>' +
      escapeHtml(parts.slice(1).join('___'));
  } else {
    sentenceEl.textContent = sentence;
  }

  // Clear input and result
  const input = document.getElementById('spellInput');
  input.value = '';
  input.disabled = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('resultMsg').textContent = '';
  document.getElementById('resultMsg').className = 'result-msg';

  isProcessing = false;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ──────────────────────────────────────────
// 提交答案
// ──────────────────────────────────────────
function submitAnswer() {
  if (isProcessing) return;

  const input = document.getElementById('spellInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  isProcessing = true;
  input.disabled = true;
  document.getElementById('submitBtn').disabled = true;

  const q = questions[currentRound];
  const correct = userAnswer.toLowerCase() === q.word.toLowerCase();

  if (correct) {
    handleCorrect();
  } else {
    handleWrong();
  }
}

// ──────────────────────────────────────────
// 大小系統
// ──────────────────────────────────────────
function applySize(containerEl, idx, animate) {
  const scale = SIZES[idx];
  const container = containerEl;

  if (!animate) {
    container.style.transition = 'none';
    container.style.transform = `scale(${scale})`;
    return;
  }

  const growing = animate === 'grow';
  const overshoot = growing ? scale * 1.18 : scale * 0.82;

  container.style.transition = 'transform 0.15s ease-out';
  container.style.transform = `scale(${overshoot})`;

  setTimeout(() => {
    container.style.transition = 'transform 0.2s ease-out';
    container.style.transform = `scale(${scale})`;
  }, 150);
}

function shakeElement(shakeWrapEl) {
  shakeWrapEl.classList.remove('shaking');
  void shakeWrapEl.offsetWidth; // reflow
  shakeWrapEl.classList.add('shaking');
  setTimeout(() => shakeWrapEl.classList.remove('shaking'), 500);
}

// ──────────────────────────────────────────
// 答對
// ──────────────────────────────────────────
function handleCorrect() {
  playSound('correct');

  // Image swap
  setImages('happy');

  // Result message
  const resultEl = document.getElementById('resultMsg');
  resultEl.textContent = '✅ 答對了！';
  resultEl.className = 'result-msg correct';

  // Size changes
  const newNunuIdx = nunuSizeIdx + 1;
  const newLoudIdx = loudSizeIdx - 1;

  let dialog = CORRECT_DIALOGS[Math.floor(Math.random() * CORRECT_DIALOGS.length)];

  if (nunuSizeIdx >= 4) {
    // Already Giant — can't grow more, shake monkey instead
    shakeElement(document.getElementById('nunuShakeWrap'));
  } else {
    nunuSizeIdx = newNunuIdx;
    applySize(document.getElementById('nunuContainer'), nunuSizeIdx, 'grow');
    playSound('size_up');
  }

  if (loudSizeIdx <= 0) {
    // Already Tiny — can't shrink more, shake Nunu instead
    shakeElement(document.getElementById('monkeyShakeWrap'));
    dialog = '好啦好啦，差不多就好！';
  } else {
    loudSizeIdx = newLoudIdx;
    applySize(document.getElementById('monkeyContainer'), loudSizeIdx, 'shrink');
    playSound('size_down');
  }

  showMonkeyDialog(dialog);

  setTimeout(() => {
    setImages('normal');
    setTimeout(() => nextRound(), 300);
  }, 800);
}

// ──────────────────────────────────────────
// 答錯
// ──────────────────────────────────────────
function handleWrong() {
  playSound('wrong');

  // Image swap
  setImages('sad');

  // Result message
  const q = questions[currentRound];
  const resultEl = document.getElementById('resultMsg');
  resultEl.textContent = `❌ 答錯了！正確答案：${q.word}`;
  resultEl.className = 'result-msg wrong';

  // Size changes
  const newNunuIdx = nunuSizeIdx - 1;
  const newLoudIdx = loudSizeIdx + 1;

  let dialog = WRONG_DIALOGS[Math.floor(Math.random() * WRONG_DIALOGS.length)];

  if (nunuSizeIdx <= 0) {
    // Already Tiny — shake monkey
    shakeElement(document.getElementById('nunuShakeWrap'));
    dialog = '撐住！努努撐住！';
  } else {
    nunuSizeIdx = newNunuIdx;
    applySize(document.getElementById('nunuContainer'), nunuSizeIdx, 'shrink');
    playSound('size_down');
  }

  if (loudSizeIdx >= 4) {
    // Already Giant — shake Nunu
    shakeElement(document.getElementById('monkeyShakeWrap'));
  } else {
    loudSizeIdx = newLoudIdx;
    applySize(document.getElementById('monkeyContainer'), loudSizeIdx, 'grow');
    playSound('size_up');
  }

  showMonkeyDialog(dialog);

  setTimeout(() => {
    setImages('normal');
    setTimeout(() => nextRound(), 300);
  }, 800);
}

// ──────────────────────────────────────────
// 下一回合 / 判勝
// ──────────────────────────────────────────
function nextRound() {
  currentRound++;

  if (currentRound >= maxRounds) {
    // 判勝
    if (nunuSizeIdx > loudSizeIdx) {
      showWin();
    } else if (loudSizeIdx > nunuSizeIdx) {
      showLose();
    } else {
      // 平手 → 延長賽
      if (allQuestions.length > questions.length) {
        questions.push(allQuestions[questions.length]);
        maxRounds++;
        renderQuestion();
        speak(questions[currentRound].tts || questions[currentRound].word);
      } else {
        // 題目用完了，平手算失敗
        showLose();
      }
    }
    return;
  }

  renderQuestion();
  speak(questions[currentRound].tts || questions[currentRound].word);
  document.getElementById('spellInput').focus();
}

// ──────────────────────────────────────────
// 圖片切換
// ──────────────────────────────────────────
function setImages(state) {
  if (imageTimer) {
    clearTimeout(imageTimer);
    imageTimer = null;
  }
  document.getElementById('nunuImg').src = NUNU_IMGS[state] || NUNU_IMGS.normal;
  document.getElementById('monkeyImg').src =
    state === 'happy' ? MONKEY_IMGS.sad :
    state === 'sad'   ? MONKEY_IMGS.happy :
    MONKEY_IMGS.normal;
}

// ──────────────────────────────────────────
// 猴子對話泡泡
// ──────────────────────────────────────────
function showMonkeyDialog(text) {
  if (dialogTimer) {
    clearTimeout(dialogTimer);
    dialogTimer = null;
  }
  const el = document.getElementById('monkeyDialog');
  el.textContent = text;
  el.classList.add('visible');
  dialogTimer = setTimeout(() => {
    el.classList.remove('visible');
    dialogTimer = null;
  }, 2000);
}

// ──────────────────────────────────────────
// 勝利 / 失敗
// ──────────────────────────────────────────
async function showWin() {
  playSound('win');

  // 猴子縮到 Tiny，顯示悲傷
  loudSizeIdx = 0;
  applySize(document.getElementById('monkeyContainer'), 0, 'shrink');
  document.getElementById('monkeyImg').src = MONKEY_IMGS.sad;
  showMonkeyDialog('好啦好啦，你今天很強。');

  let saved = false;
  if (typeof window.addMic === 'function') saved = await window.addMic();
  let total = 0;
  if (typeof window.getMic === 'function') total = await window.getMic();

  const rewardEl = document.getElementById('winReward');
  rewardEl.textContent = saved
    ? `獲得 🎤 ×1　現在共有 🎤 ${total} 個！`
    : '獲得 🎤 ×1（請登入才能儲存）';

  setTimeout(() => {
    document.getElementById('winScreen').classList.add('show');
  }, 800);
}

function showLose() {
  playSound('lose');

  // 猴子放大到 Giant，顯示開心
  loudSizeIdx = 4;
  applySize(document.getElementById('monkeyContainer'), 4, 'grow');
  document.getElementById('monkeyImg').src = MONKEY_IMGS.happy;
  showMonkeyDialog('哈哈！再練練吧！');

  setTimeout(() => {
    document.getElementById('loseScreen').classList.add('show');
  }, 800);
}

// ──────────────────────────────────────────
// 導航
// ──────────────────────────────────────────
function retryBattle() { location.reload(); }
function goHome() { window.location.href = 'index.html'; }

// ──────────────────────────────────────────
// Enter 鍵提交
// ──────────────────────────────────────────
document.getElementById('spellInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAnswer();
});

// ──────────────────────────────────────────
// 啟動初始化
// ──────────────────────────────────────────
// Apply initial sizes (both index 2 = scale 1.0)
applySize(document.getElementById('nunuContainer'), 2, false);
applySize(document.getElementById('monkeyContainer'), 2, false);

init();
</script>
