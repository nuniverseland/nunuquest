  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA-E-IN6185ruhUb-TB9LkDyK5xJayLBxU",
      authDomain: "nunuquest.firebaseapp.com",
      projectId: "nunuquest",
      storageBucket: "nunuquest.firebasestorage.app",
      messagingSenderId: "374919361286",
      appId: "1:374919361286:web:64108f0715eaa69f956487"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const currentUserId = sessionStorage.getItem('nunuUserId');

    window.saveSneakyWin = async function() {
      if (!currentUserId) return { saved: false, fish: 0 };
      try {
        const ref  = doc(db, 'users', currentUserId);
        const snap = await getDoc(ref);
        const update = {
          'danang.fish': increment(1),
          'danang.sneaky_monkey_count': increment(1)
        };
        if (snap.exists()) {
          await updateDoc(ref, update);
          const newSnap = await getDoc(ref);
          return { saved: true, fish: newSnap.data()?.danang?.fish || 1 };
        } else {
          await setDoc(ref, { danang: { fish: 1, sneaky_monkey_count: 1 } }, { merge: true });
          return { saved: true, fish: 1 };
        }
      } catch(e) { console.error(e); return { saved: false, fish: 0 }; }
    };

    window.getFish = async function() {
      if (!currentUserId) return 0;
      try {
        const snap = await getDoc(doc(db, 'users', currentUserId));
        return snap.exists() ? (snap.data()?.danang?.fish || 0) : 0;
      } catch(e) { return 0; }
    };
  </script>

/* ========================================================

======================================================== */
const BASE_URL = 'https://nuniverseland.github.io/nunuquest/assets/danang/';

const G = {
  energy: 0,
  maxEnergy: 1000,
  baseHP: 10,
  maxBaseHP: 10,
  gameOver: false,
  paused: false,

  // wave
  wave: 0,
  waveActive: false,
  spawnQueue: [],
  spawnTimer: null,
  checkingWave: false,

  // enemies
  enemies: [],
  nextEnemyId: 0,

  // turret (one at a time: null | { type:'gun'|'cannon', hp, maxHP, posX, el, hpFillEl, attackTimer })
  turret: null,

  // question
  answerLocked: false,
  correctAnswer: null,
  questionType: null,
  multCount: 0,

  // banu
  banuMaxHP: 1000,
};

/* ========================================================
   AUDIO
======================================================== */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTones(freqs, duration = 0.12, type = 'sine', vol = 0.25) {
  try {
    const ctx = getAudioCtx();
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * (duration * 0.9);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.start(t);
      osc.stop(t + duration + 0.05);
    });
  } catch(e) {}
}

const SFX = {
  correctMult:  () => playTones([523, 659], 0.12),
  correctAdd:   () => playTones([523, 659, 784], 0.12),
  wrong:        () => playTones([400, 300], 0.15, 'sawtooth', 0.2),
  shoot:        () => playTones([800, 600], 0.07, 'square', 0.15),
  monkeyDie:    () => playTones([200, 150], 0.2, 'triangle', 0.3),
  baseHit:      () => playTones([440, 330], 0.18, 'sawtooth', 0.25),
  bossAppear:   () => playTones([150, 120, 100], 0.3, 'triangle', 0.35),
  win:          () => playTones([523, 659, 784, 1047], 0.18),
  lose:         () => playTones([400, 350, 280, 220], 0.2, 'sawtooth', 0.25),
};

/* ========================================================
   INIT
======================================================== */
function init() {
  const nick = sessionStorage.getItem('nunuNickname') || sessionStorage.getItem('nickname') || '';
  document.getElementById('nickname-display').textContent = nick ? `🐒 ${nick}` : '🐒';

  renderHearts();
  updateEnergyUI();
  generateQuestion();
  spawnTurret('gun', true); // 初始機關槍炮台（免費）
  updateWeaponButtons();

  setTimeout(() => startWave(1), 10000);
  requestAnimationFrame(gameLoop);
}

/* ========================================================
   HEARTS
======================================================== */
function renderHearts() {
  const el = document.getElementById('hp-hearts');
  el.innerHTML = '';
  for (let i = 0; i < G.maxBaseHP; i++) {
    const span = document.createElement('span');
    span.className = 'heart' + (i >= G.baseHP ? ' lost' : '');
    span.textContent = '❤️';
    el.appendChild(span);
  }
}

/* ========================================================
   ENERGY
======================================================== */
function addEnergy(amount) {
  G.energy = Math.min(G.maxEnergy, G.energy + amount);
  updateEnergyUI();
}

function spendEnergy(amount) {
  if (G.energy < amount) return false;
  G.energy -= amount;
  updateEnergyUI();
  return true;
}

function updateEnergyUI() {
  const pct = (G.energy / G.maxEnergy) * 100;
  document.getElementById('energy-fill').style.width = pct + '%';
  document.getElementById('energy-count').textContent = `${G.energy} / ${G.maxEnergy}`;
  updateWeaponButtons();
}

/* ========================================================
   QUESTIONS
======================================================== */
function generateQuestion() {
  // 60% mult, 40% addsub — but enforce 2-mult-then-1-addsub pattern approximately
  let type;
  G.multCount++;
  if (G.multCount >= 3) {
    type = 'addsub';
    G.multCount = 0;
  } else {
    type = Math.random() < 0.65 ? 'mult' : 'addsub';
    if (type === 'addsub') G.multCount = 0;
  }
  G.questionType = type;

  if (type === 'mult') {
    generateMult();
  } else {
    generateAddSub();
  }
}

function generateMult() {
  document.getElementById('q-type-badge').textContent = '九九乘法';
  const a = randInt(2, 9);
  const b = randInt(2, 9);
  G.correctAnswer = a * b;

  const display = document.getElementById('q-display');
  display.className = 'q-display';
  display.textContent = `${a} × ${b} = ?`;

  renderChoices(G.correctAnswer, 1, 9);
}

function generateAddSub() {
  const isAdd = Math.random() < 0.5;
  document.getElementById('q-type-badge').textContent = isAdd ? '二位數加法' : '二位數減法';

  let a, b, ans, line1, op;
  if (isAdd) {
    a = randInt(10, 59);
    b = randInt(10, Math.min(59, 99 - a));
    ans = a + b;
    op = '+';
  } else {
    a = randInt(30, 99);
    b = randInt(10, Math.min(49, a - 1));
    ans = a - b;
    op = '−';
  }
  G.correctAnswer = ans;

  const display = document.getElementById('q-display');
  display.className = 'q-display vertical';
  // Align vertically: 2 digit numbers
  const aStr = String(a).padStart(3, ' ');
  const bStr = String(b).padStart(3, ' ');
  display.textContent = `${aStr}\n${op}${bStr.slice(1)}\n────\n   ?`;

  renderChoices(G.correctAnswer, 5, 15);
}

function renderChoices(correct, minDelta, maxDelta) {
  const pool = new Set([correct]);
  while (pool.size < 3) {
    const delta = randInt(minDelta, maxDelta) * (Math.random() < 0.5 ? 1 : -1);
    const v = correct + delta;
    if (v > 0 && v !== correct) pool.add(v);
  }
  const choices = [...pool].sort(() => Math.random() - 0.5);

  const container = document.getElementById('answer-buttons');
  container.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = c;
    btn.addEventListener('click', () => handleAnswer(c, btn));
    container.appendChild(btn);
  });
  document.getElementById('feedback-text').textContent = '';
  document.getElementById('feedback-text').className = 'feedback-text';
  G.answerLocked = false;
}

function handleAnswer(chosen, btn) {
  if (G.answerLocked || G.gameOver) return;
  G.answerLocked = true;

  // Disable all buttons
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

  const correct = chosen === G.correctAnswer;
  const fb = document.getElementById('feedback-text');

  if (correct) {
    btn.classList.add('correct');
    if (G.questionType === 'mult') {
      fb.textContent = '✓ 正確！+80 能量';
      fb.className = 'feedback-text correct';
      addEnergy(80);
      showFloatText('+80 🥥', '#ffd700');
      SFX.correctMult();
    } else {
      fb.textContent = '✓ 正確！+250 能量';
      fb.className = 'feedback-text correct';
      addEnergy(250);
      showFloatText('+250 🥥', '#ffd700');
      SFX.correctAdd();
    }
  } else {
    btn.classList.add('wrong');
    // Show correct
    document.querySelectorAll('.ans-btn').forEach(b => {
      if (parseInt(b.textContent) === G.correctAnswer || b.textContent == G.correctAnswer) {
        b.classList.add('correct');
      }
    });
    fb.textContent = `✗ 答錯了！正確答案：${G.correctAnswer}`;
    fb.className = 'feedback-text wrong';
    damageBase(1);
    SFX.wrong();
    shakeNunu();
  }

  setTimeout(() => {
    if (!G.gameOver) generateQuestion();
  }, 800);
}

/* ========================================================
   WAVE SYSTEM
======================================================== */
function startWave(n) {
  if (G.gameOver) return;
  G.wave = n;
  G.waveActive = true;

  if (n === 1) {
    showBanner('⚠️ Wave 1 來了！', 1500);
    G.spawnQueue = buildQueue(1);
    setTimeout(() => spawnNext(), 1500);
  } else if (n === 2) {
    showBanner('⚠️ Wave 2 來了！', 1500);
    G.spawnQueue = buildQueue(2);
    setTimeout(() => spawnNext(), 1500);
  } else if (n === 3) {
    showBanner('💀 Banu 出現了！', 1800);
    SFX.bossAppear();
    document.getElementById('banu-hp-bar').style.display = 'block';
    G.spawnQueue = buildQueue(3);
    setTimeout(() => spawnNext(), 1800);
  }
}

function buildQueue(wave) {
  if (wave === 1) {
    return Array(5).fill('small');
  } else if (wave === 2) {
    const q = [...Array(3).fill('small'), ...Array(2).fill('mid')];
    return shuffle(q);
  } else {
    return ['banu'];
  }
}

function spawnNext() {
  if (G.gameOver || G.spawnQueue.length === 0) return;
  const type = G.spawnQueue.shift();
  spawnEnemy(type);

  if (G.spawnQueue.length > 0) {
    const interval = G.wave === 1 ? 3000 : 2500;
    G.spawnTimer = setTimeout(() => spawnNext(), interval);
  }
}

function checkWaveTransition() {
  if (G.gameOver || G.checkingWave) return;
  if (G.spawnQueue.length > 0) return;
  if (G.enemies.length > 0) return;

  G.checkingWave = true;
  const nextWave = G.wave + 1;
  if (nextWave <= 3) {
    setTimeout(() => {
      G.checkingWave = false;
      if (!G.gameOver && G.enemies.length === 0 && G.spawnQueue.length === 0) {
        startWave(nextWave);
      }
    }, 1500);
  } else {
    G.checkingWave = false;
  }
}

/* ========================================================
   ENEMIES
======================================================== */
function spawnEnemy(type) {
  const id = G.nextEnemyId++;
  const gameArea = document.getElementById('game-area');
  const gaW = gameArea.offsetWidth;
  const gaH = gameArea.offsetHeight;

  // Speed: crosses game area in N seconds
  // small: 8s, mid: 12s, banu: 20s
  const speedSec = type === 'small' ? 15 : type === 'mid' ? 25 : 40;
  const hp = type === 'small' ? 100 : type === 'mid' ? 200 : 1000;

  const enemy = {
    id,
    type,
    hp,
    maxHP: hp,
    // position as % of game-area width (100 = right edge, 0 = left edge / base)
    posX: 102,
    speedPct: 100 / (speedSec * 60), // percent per frame at 60fps
    el: null,
    hpFillEl: null,
  };

  // DOM
  const div = document.createElement('div');
  div.className = 'enemy' + (type === 'mid' ? ' mid-monkey' : type === 'banu' ? ' banu' : '');
  div.id = `enemy-${id}`;

  const hpBar = document.createElement('div');
  hpBar.className = 'enemy-hp-bar';
  const hpFill = document.createElement('div');
  hpFill.className = 'enemy-hp-fill';
  hpBar.appendChild(hpFill);

  const img = document.createElement('img');
  const imgFile = type === 'small' ? 'monkey_sneaky_walk.png'
                : type === 'mid'   ? 'monkey_sneaky_mid.png'
                : 'battle_banu_walk.png';
  img.src = BASE_URL + imgFile;
  img.alt = type;

  div.appendChild(hpBar);
  div.appendChild(img);
  gameArea.appendChild(div);

  // Position
  div.style.left = '102%';
  div.style.bottom = '12%';

  enemy.el = div;
  enemy.hpFillEl = hpFill;
  G.enemies.push(enemy);
}

function updateEnemyPositions() {
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];

    // If attacking turret, stop moving and deal damage periodically
    if (e.attackingTurret) {
      if (!G.turret) {
        // Turret gone, resume walking
        e.attackingTurret = false;
      }
      continue;
    }

    e.posX -= e.speedPct;
    e.el.style.left = e.posX + '%';

    // Hit turret?
    if (G.turret && e.posX <= G.turret.posX + 4) {
      e.attackingTurret = true;
      if (!e.turretAttackTimer) {
        e.turretAttackTimer = setInterval(() => {
          if (G.gameOver) return;
          if (!G.turret) {
            clearInterval(e.turretAttackTimer);
            e.turretAttackTimer = null;
            e.attackingTurret = false;
            return;
          }
          damageTurret(1);
        }, 600);
      }
      continue;
    }

    // Walked off screen → hit base
    if (e.posX < -8) {
      if (e.turretAttackTimer) { clearInterval(e.turretAttackTimer); e.turretAttackTimer = null; }
      damageBase(1);
      SFX.baseHit();
      shakeNunu();
      removeEnemy(i);
    }
  }
}

function removeEnemy(index) {
  const e = G.enemies[index];
  if (e.turretAttackTimer) { clearInterval(e.turretAttackTimer); e.turretAttackTimer = null; }
  if (e.el && e.el.parentNode) e.el.parentNode.removeChild(e.el);
  G.enemies.splice(index, 1);
  setTimeout(() => checkWaveTransition(), 200);
}

function killEnemy(index) {
  const e = G.enemies[index];
  if (e.turretAttackTimer) { clearInterval(e.turretAttackTimer); e.turretAttackTimer = null; }
  SFX.monkeyDie();
  if (e.el) {
    e.el.style.opacity = '0';
    e.el.style.transition = 'opacity 0.2s';
  }
  setTimeout(() => {
    if (e.el && e.el.parentNode) e.el.parentNode.removeChild(e.el);
  }, 200);
  G.enemies.splice(index, 1);

  // Check win
  if (G.wave === 3 && G.enemies.length === 0 && G.spawnQueue.length === 0) {
    triggerWin();
    return;
  }

  setTimeout(() => checkWaveTransition(), 300);
}

function getNearestEnemy() {
  if (G.enemies.length === 0) return -1;
  let minX = Infinity, minIdx = -1;
  G.enemies.forEach((e, i) => {
    if (e.posX < minX) { minX = e.posX; minIdx = i; }
  });
  return minIdx;
}

function damageEnemy(index, dmg) {
  if (index < 0 || index >= G.enemies.length) return;
  const e = G.enemies[index];
  e.hp = Math.max(0, e.hp - dmg);

  // Update HP bar
  const pct = (e.hp / e.maxHP) * 100;
  e.hpFillEl.style.width = pct + '%';
  if (pct < 30) e.hpFillEl.style.background = '#ff3333';
  else if (pct < 60) e.hpFillEl.style.background = '#ffaa00';

  // Banu HP bar
  if (e.type === 'banu') {
    document.getElementById('banu-hp-fill').style.width = pct + '%';
  }

  if (e.hp <= 0) {
    killEnemy(index);
  }
}

/* ========================================================
   TURRET SYSTEM
======================================================== */
const TURRET_DEFS = {
  gun:    { hp: 10,  maxHP: 10,  cost: 400, posX: 10, img: 'weapon_gun.png',    attackInterval: 1000, attackDmg: 20,  autoCannon: false },
  cannon: { hp: 20,  maxHP: 20,  cost: 900, posX: 10, img: 'weapon_cannon.png', attackInterval: 3000, attackDmg: 350, autoCannon: true  },
};

function spawnTurret(type, free = false) {
  if (G.gameOver) return;
  const def = TURRET_DEFS[type];
  if (!free && !spendEnergy(def.cost)) return;

  // Remove existing turret
  if (G.turret) destroyTurret(false);

  const gameArea = document.getElementById('game-area');
  const el = document.createElement('div');
  el.className = 'turret-base';
  el.id = 'turret-el';
  el.style.left = def.posX + '%';

  const hpBar = document.createElement('div');
  hpBar.className = 'turret-hp-bar';
  const hpFill = document.createElement('div');
  hpFill.className = 'turret-hp-fill';
  hpBar.appendChild(hpFill);

  const img = document.createElement('img');
  img.className = 'turret-img';
  img.src = BASE_URL + def.img;
  img.alt = type;

  el.appendChild(hpBar);
  el.appendChild(img);
  gameArea.appendChild(el);

  // Auto-attack timer
  const attackTimer = setInterval(() => {
    if (G.gameOver || !G.turret) return;
    const idx = getNearestEnemy();
    if (idx >= 0) {
      fireProjectile(() => {
        const i = getNearestEnemy();
        if (i >= 0) damageEnemy(i, def.attackDmg);
      });
    }
  }, def.attackInterval);

  G.turret = { type, hp: def.hp, maxHP: def.maxHP, posX: def.posX, el, hpFillEl: hpFill, attackTimer };
  updateWeaponButtons();
}

function damageTurret(dmg) {
  if (!G.turret) return;
  G.turret.hp = Math.max(0, G.turret.hp - dmg);
  const pct = (G.turret.hp / G.turret.maxHP) * 100;
  G.turret.hpFillEl.style.width = pct + '%';
  if (pct < 30) G.turret.hpFillEl.style.background = '#ff3333';
  else if (pct < 60) G.turret.hpFillEl.style.background = '#ffaa00';
  if (G.turret.hp <= 0) destroyTurret(true);
}

function destroyTurret(explode = true) {
  if (!G.turret) return;
  clearInterval(G.turret.attackTimer);
  const el = G.turret.el;
  G.turret = null; // 先清掉，讓按鈕立即解鎖
  if (el) {
    if (explode) {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(() => el.remove(), 300);
    } else {
      el.remove();
    }
  }
  updateWeaponButtons();
}

/* ========================================================
   WEAPONS (single shot)
======================================================== */
function fireWeapon(type) {
  if (G.gameOver || G.paused || type !== 'single') return;
  if (!spendEnergy(80)) return;
  fireProjectile(() => {
    const idx = getNearestEnemy();
    if (idx >= 0) damageEnemy(idx, 50);
  });
  updateWeaponButtons();
}

function buyTurret(type) {
  if (G.gameOver || G.paused) return;
  if (G.turret) {
    // 已有炮台：不能購買
    return;
  }
  spawnTurret(type);
  updateWeaponButtons();
}

function updateWeaponButtons() {
  const btnS = document.getElementById('btn-single');
  const btnG = document.getElementById('btn-gun');
  const btnC = document.getElementById('btn-cannon');
  const hasTurret = !!G.turret;

  btnS.disabled = G.energy < 80  || G.gameOver;
  btnG.disabled = G.energy < 400 || G.gameOver || hasTurret;
  btnC.disabled = G.energy < 900 || G.gameOver || hasTurret;

  if (hasTurret) {
    const activeBtn = G.turret.type === 'gun' ? btnG : btnC;
    activeBtn.classList.add('deployed');
    const costEl = document.getElementById(G.turret.type === 'gun' ? 'gun-cost-text' : 'cannon-cost-text');
    if (costEl) costEl.textContent = `🛡️ 部署中 HP:${G.turret.hp}/${G.turret.maxHP}`;
  } else {
    btnG.classList.remove('deployed');
    btnC.classList.remove('deployed');
    document.getElementById('gun-cost-text').textContent    = '🥥 400｜HP:10｜每秒20傷';
    document.getElementById('cannon-cost-text').textContent = '🥥 900｜HP:20｜每3秒350傷';
  }
}

/* ========================================================
   PROJECTILE ANIMATION
======================================================== */
function fireProjectile(onHit, silent = false) {
  const gameArea = document.getElementById('game-area');
  const gaW = gameArea.offsetWidth;
  const gaH = gameArea.offsetHeight;

  const bullet = document.createElement('div');
  bullet.className = 'coconut-bullet';
  bullet.innerHTML = `<img src="${BASE_URL}coconut_flying.png" alt="🥥">`;

  // Start: Nunu base position (~8% from left, bottom ~25%)
  const startLeft = gaW * 0.08;
  const startBottom = gaH * 0.22;

  bullet.style.left = startLeft + 'px';
  bullet.style.bottom = startBottom + 'px';
  gameArea.appendChild(bullet);

  // Target: nearest enemy x position (or 90% if no enemy)
  const nearestIdx = getNearestEnemy();
  const targetPct = nearestIdx >= 0 ? G.enemies[nearestIdx].posX : 88;
  const targetLeft = (targetPct / 100) * gaW;

  // Animate via RAF
  const startTime = performance.now();
  const duration = 300; // ms

  function animFrame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const currentLeft = startLeft + (targetLeft - startLeft) * t;
    bullet.style.left = currentLeft + 'px';

    if (t < 1) {
      requestAnimationFrame(animFrame);
    } else {
      bullet.remove();
      if (onHit) onHit();
    }
  }
  requestAnimationFrame(animFrame);

  if (!silent) SFX.shoot();
}

/* ========================================================
   RAF GAME LOOP
======================================================== */
let lastTime = 0;
function gameLoop(timestamp) {
  if (!G.gameOver && !G.paused) {
    updateEnemyPositions();
  }
  requestAnimationFrame(gameLoop);
}

/* ========================================================
   BASE DAMAGE
======================================================== */
function damageBase(amount) {
  if (G.gameOver) return;
  G.baseHP = Math.max(0, G.baseHP - amount);
  renderHearts();
  if (G.baseHP <= 0) {
    triggerLose();
  }
}

function shakeNunu() {
  const base = document.getElementById('nunu-base');
  base.classList.remove('shake');
  void base.offsetWidth; // reflow
  base.classList.add('shake');
  setTimeout(() => base.classList.remove('shake'), 500);
}

/* ========================================================
   WIN / LOSE
======================================================== */
async function triggerWin() {
  if (G.gameOver) return;
  G.gameOver = true;
  G.paused = true;
  SFX.win();

  if (G.turret) destroyTurret(false);
  G.enemies.forEach(e => { if (e.turretAttackTimer) clearInterval(e.turretAttackTimer); });
  if (G.spawnTimer) clearTimeout(G.spawnTimer);

  const result = await window.saveSneakyWin();
  const fish = result.fish || 1;

  document.getElementById('win-reward').innerHTML =
    `獲得 🐟 ×1<br>現在共有 🐟 × ${fish} 個`;
  document.getElementById('win-overlay').classList.add('active');
}

function triggerLose() {
  if (G.gameOver) return;
  G.gameOver = true;
  G.paused = true;
  SFX.lose();

  if (G.turret) destroyTurret(false);
  G.enemies.forEach(e => { if (e.turretAttackTimer) clearInterval(e.turretAttackTimer); });
  if (G.spawnTimer) clearTimeout(G.spawnTimer);

  document.getElementById('lose-overlay').classList.add('active');
}

/* ========================================================
   UI HELPERS
======================================================== */
function showBanner(text, duration) {
  const el = document.getElementById('wave-banner');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, duration);
}

function showFloatText(text, color) {
  const panel = document.getElementById('question-panel');
  const rect = panel.getBoundingClientRect();

  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.color = color;
  el.style.left = (rect.left + rect.width * 0.3) + 'px';
  el.style.top  = (rect.top + 10) + 'px';
  el.style.position = 'fixed';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

/* ========================================================
   UTILS
======================================================== */
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ========================================================
   BOOT
======================================================== */
window.addEventListener('DOMContentLoaded', init);
