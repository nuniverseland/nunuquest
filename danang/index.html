<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>峴港保衛戰 🌴</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA-E-IN6185ruhUb-TB9LkDyK5xJayLBxU",
      authDomain: "nunuquest.firebaseapp.com",
      projectId: "nunuquest",
      storageBucket: "nunuquest.firebasestorage.app",
      messagingSenderId: "374919361286",
      appId: "1:374919361286:web:64108f0715eaa69f956487",
      measurementId: "G-52NEV252QK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function updateDisplay(count) {
      // 椰子圖示最多顯示5個
      for (let i = 1; i <= 5; i++) {
        const pc = document.getElementById('pc-c' + i);
        const m = document.getElementById('m-c' + i);
        if (pc) { if (i <= Math.min(count, 5)) pc.classList.add('earned'); else pc.classList.remove('earned'); }
        if (m)  { if (i <= Math.min(count, 5)) m.classList.add('earned');  else m.classList.remove('earned'); }
      }

      // 文字顯示
      const pcText = document.getElementById('pc-coconutText');
      const mText = document.getElementById('m-coconutText');
      let displayText = '';
      if (count >= 5) {
        displayText = count > 5 ? `🥥 ${count} 顆　越多越好！` : `${count} / 5 顆`;
      } else {
        displayText = `${count} / 5 顆`;
      }
      if (pcText) pcText.textContent = displayText;
      if (mText)  mText.textContent  = displayText;

      // Banu 解鎖
      const banuBtn = document.getElementById('pc-banuBtn');
      const banuNeeded = document.getElementById('pc-banuNeeded');
      if (!banuBtn) return;

      if (count >= 5) {
        banuBtn.classList.remove('locked');
        banuNeeded.textContent = '👑 挑戰老大！';
      } else {
        banuBtn.classList.add('locked');
        banuNeeded.textContent = '🔒 還需要 ' + (5 - count) + ' 顆椰子';
      }
    }

    // Banu 鎖定點擊抖動
    document.addEventListener('DOMContentLoaded', () => {
      const banuBtn = document.getElementById('pc-banuBtn');
      if (banuBtn) {
        banuBtn.addEventListener('click', function(e) {
          if (this.classList.contains('locked')) {
            e.preventDefault();
            const sec = document.getElementById('pc-banuSection');
            sec.classList.add('shake');
            setTimeout(() => sec.classList.remove('shake'), 300);
          }
        });
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const ref = doc(db, 'users', user.uid);
          const snap = await getDoc(ref);
          const coconuts = snap.exists() ? (snap.data()?.danang?.coconuts || 0) : 0;
          updateDisplay(coconuts);
        } catch(e) {
          console.error('讀取椰子失敗:', e);
          updateDisplay(0);
        }
      } else {
        updateDisplay(0);
      }
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #1a1a2e;
      overflow-x: hidden;
    }

    /* ── 電腦版：3:2 比例容器，精準定位 ── */
    .scene {
      display: none; /* 預設隱藏，電腦才顯示 */
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2; /* 1536x1024 */
    }
    .scene img.bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 電腦版顯示 */
    @media (min-width: 600px) {
      .scene { display: block; }
      .mobile-scene { display: none; }
    }

    /* ── 手機版：直式圖，之後再設計 ── */
    .mobile-scene {
      position: relative;
      width: 100%;
    }
    .mobile-scene img.bg {
      width: 100%;
      height: auto;
      display: block;
    }
    .mobile-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5%;
    }

    /* ── 電腦版定位（百分比 = 像素位置 / 1536 or 1024）── */

    /* 標題：上方置中 */
    .pc-title {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }
    .pc-title h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(1.2rem, 2.5vw, 2.2rem);
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }
    .pc-title p {
      font-size: clamp(0.65rem, 1.2vw, 1rem);
      color: #f4e3b2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-top: 2px;
    }

    /* 椰子進度：左上 */
    .pc-coconut {
      position: absolute;
      top: 3%;
      left: 1%;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 8px 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
    }
    .pc-coconut .bar-title {
      font-size: 0.7vw;
      color: #f4e3b2;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .coconut-icons {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 2px;
    }
    .coconut-icon {
      font-size: 1.2vw;
      filter: grayscale(1) opacity(0.3);
      transition: all 0.4s;
    }
    .coconut-icon.earned {
      filter: none;
      animation: bounce-in 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    @keyframes bounce-in {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .coconut-progress-text {
      font-size: 0.65vw;
      color: #f4e3b2;
      text-align: center;
    }

    /* 故事按鈕：中間沙灘 left:35% top:45% */
    /* 左側面板：猴子三列 */
    .pc-left-panel {
      position: absolute;
      top: 55%;
      left: 3%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    /* 故事按鈕：標題正下方置中 */
    .pc-story {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
    }
    .pc-story img {
      width: 18vw;
      max-width: 240px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
      transition: transform 0.15s;
      cursor: pointer;
    }
    .pc-story img:active { transform: scale(0.95); }

    /* 三隻猴子一排 */
    .pc-monkey-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }

    /* Banu：山洞口，往左調 */
    .pc-banu {
      position: absolute;
      top: 35%;
      right: 8%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 猴子共用 */
    .monkey-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: transform 0.15s;
      cursor: pointer;
    }
    .monkey-btn:active { transform: scale(0.92); }
    .monkey-btn img {
      width: 15vw;
      max-width: 200px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
    }
    .monkey-tag {
      margin-top: 4px;
      background: rgba(0,0,0,0.65);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8vw;
      font-weight: 700;
      color: white;
      white-space: nowrap;
    }

    /* Banu 按鈕 */
    .banu-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: transform 0.15s;
    }
    .banu-btn.locked { opacity: 0.65; cursor: not-allowed; }
    .banu-btn:not(.locked):active { transform: scale(0.95); }
    .banu-btn img {
      width: 10vw;
      max-width: 150px;
      filter: drop-shadow(0 4px 20px rgba(255,80,0,0.5));
    }
    .banu-tag {
      margin-top: 3px;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.65vw;
      font-weight: 700;
      color: #f4e3b2;
      white-space: nowrap;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.3s; }

    /* ── 手機版樣式 ── */
    .mobile-title {
      font-family: 'Baloo 2', cursive;
      font-size: 1.4rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      text-align: center;
    }
    .mobile-subtitle {
      font-size: 0.75rem;
      color: #f4e3b2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-top: 2px;
      text-align: center;
    }
    .mobile-coconut {
      margin-top: 10px;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 8px 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      text-align: center;
      width: 75%;
    }
    .mobile-coconut .bar-title {
      font-size: 0.7rem;
      color: #f4e3b2;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .mobile-coconut .coconut-icon { font-size: 1.3rem; }
    .mobile-coconut .coconut-progress-text { font-size: 0.65rem; }
  </style>
</head>
<body>

<!-- ── 電腦版 ── -->
<div class="scene">
  <img class="bg" src="https://nuniverseland.github.io/nunuquest/assets/danang/header_desktop.png" alt="峴港">

  <!-- 標題 -->
  <div class="pc-title">
    <h1>🐒 峴港保衛戰</h1>
    <p>椰子收集限時活動 🥥 對抗壞猴小隊！</p>
  </div>

  <!-- 椰子進度 -->
  <div class="pc-coconut">
    <div class="bar-title">🥥 集滿5顆挑戰Banu！</div>
    <div class="coconut-icons">
      <span class="coconut-icon" id="pc-c1">🥥</span>
      <span class="coconut-icon" id="pc-c2">🥥</span>
      <span class="coconut-icon" id="pc-c3">🥥</span>
      <span class="coconut-icon" id="pc-c4">🥥</span>
      <span class="coconut-icon" id="pc-c5">🥥</span>
    </div>
    <div class="coconut-progress-text" id="pc-coconutText">0 / 5 顆</div>
  </div>

  <!-- 故事按鈕：標題正下方 -->
  <div class="pc-story">
    <a href="story.html">
      <img src="https://nuniverseland.github.io/nunuquest/assets/danang/btn_story.png" alt="故事篇章">
    </a>
  </div>

  <!-- 三隻猴子：左下沙灘 -->
  <div class="pc-left-panel">
    <div class="pc-monkey-row">
      <a href="battle_stone.html" class="monkey-btn">
        <img src="https://nuniverseland.github.io/nunuquest/assets/danang/monkey_stone.png" alt="石頭猴">
        <div class="monkey-tag">石頭猴 🥥×1</div>
      </a>
      <a href="battle_loud.html" class="monkey-btn">
        <img src="https://nuniverseland.github.io/nunuquest/assets/danang/monkey_loud.png" alt="嘴砲猴">
        <div class="monkey-tag">嘴砲猴 🥥×2</div>
      </a>
      <a href="battle_sneaky.html" class="monkey-btn">
        <img src="https://nuniverseland.github.io/nunuquest/assets/danang/monkey_sneaky.png" alt="壞心眼猴">
        <div class="monkey-tag">壞心眼猴 🥥×2</div>
      </a>
    </div>
  </div>

  <!-- Banu：山洞口 -->
  <div class="pc-banu" id="pc-banuSection">
    <a href="battle_banu.html" class="banu-btn locked" id="pc-banuBtn">
      <img src="https://nuniverseland.github.io/nunuquest/assets/danang/banu.png" alt="Banu">
      <div class="banu-tag" id="pc-banuNeeded">🔒 還需要 5 顆椰子</div>
    </a>
  </div>
</div>

<!-- ── 手機版（暫時簡單版，之後再設計）── -->
<div class="mobile-scene">
  <img class="bg" src="https://nuniverseland.github.io/nunuquest/assets/danang/header_mobile.png" alt="峴港">
  <div class="mobile-overlay">
    <div class="mobile-title">🐒 峴港保衛戰</div>
    <div class="mobile-subtitle">椰子收集限時活動 🥥</div>
    <div class="mobile-coconut">
      <div class="bar-title">🥥 集滿5顆挑戰Banu！</div>
      <div class="coconut-icons">
        <span class="coconut-icon" id="m-c1">🥥</span>
        <span class="coconut-icon" id="m-c2">🥥</span>
        <span class="coconut-icon" id="m-c3">🥥</span>
        <span class="coconut-icon" id="m-c4">🥥</span>
        <span class="coconut-icon" id="m-c5">🥥</span>
      </div>
      <div class="coconut-progress-text" id="m-coconutText">0 / 5 顆</div>
    </div>
  </div>
</div>


</body>
</html>
