<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>峴港保衛戰 🌴</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA-E-IN6185ruhUb-TB9LkDyK5xJayLBxU",
      authDomain: "nunuquest.firebaseapp.com",
      projectId: "nunuquest",
      storageBucket: "nunuquest.firebasestorage.app",
      messagingSenderId: "374919361286",
      appId: "1:374919361286:web:64108f0715eaa69f956487",
      measurementId: "G-52NEV252QK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const userId = sessionStorage.getItem('nunuUserId');
    const nickname = sessionStorage.getItem('nunuNickname') || userId || '冒險者';

    // 更新狀態列暱稱
    const statusUser = document.getElementById('statusUser');
    if (statusUser) statusUser.textContent = '🐒 ' + nickname;

    async function loadItems() {
      if (!userId) { updateDisplay(0, 0); return; }
      try {
        const snap = await getDoc(doc(db, 'users', userId));
        const d = snap.exists() ? (snap.data()?.danang || {}) : {};
        const stone    = d.stone    || 0;
        const mic      = d.mic      || 0;
        const coconuts = d.coconuts || 0;
        updateDisplay(stone, mic);
        const statusCoconut = document.getElementById('statusCoconut');
        if (statusCoconut) statusCoconut.textContent = '🥥 ' + coconuts + ' 顆';
      } catch(e) {
        updateDisplay(0, 0);
      }
    }

    function updateDisplay(stone, mic) {
      document.getElementById('pc-stoneCount').textContent = stone;
      document.getElementById('pc-micCount').textContent   = mic;
      document.getElementById('pc-stoneItem').classList.toggle('item-ready', stone >= 1);
      document.getElementById('pc-micItem').classList.toggle('item-ready',   mic   >= 1);

      const banuBtn    = document.getElementById('pc-banuBtn');
      const banuNeeded = document.getElementById('pc-banuNeeded');
      if (!banuBtn) return;
      const canChallenge = stone >= 1 && mic >= 1;
      if (canChallenge) {
        banuBtn.classList.remove('locked');
        banuNeeded.textContent = '👑 挑戰老大！';
      } else {
        banuBtn.classList.add('locked');
        const missing = [];
        if (stone < 1) missing.push('🪨');
        if (mic   < 1) missing.push('🎤');
        banuNeeded.textContent = '🔒 還缺 ' + missing.join(' ');
      }
    }

    // Banu 鎖定點擊抖動
    document.addEventListener('DOMContentLoaded', () => {
      const banuBtn = document.getElementById('pc-banuBtn');
      if (banuBtn) {
        banuBtn.addEventListener('click', function(e) {
          if (this.classList.contains('locked')) {
            e.preventDefault();
            const sec = document.getElementById('pc-banuSection');
            sec.classList.add('shake');
            setTimeout(() => sec.classList.remove('shake'), 300);
          }
        });
      }
    });

    loadItems();

    // ── 椰子排行榜 ──
    window.showLeaderboard = async function() {
      document.getElementById('lb-modal').classList.add('active');
      const list = document.getElementById('lb-list');
      list.innerHTML = '<div style="text-align:center;padding:20px;color:#f4e3b2;font-weight:700;">載入中…</div>';
      try {
        const snap = await getDocs(collection(db, 'users'));
        const players = [];
        snap.forEach(d => {
          const data = d.data();
          const coconuts = data?.danang?.coconuts || 0;
          players.push({ id: d.id, nickname: data.nickname || '冒險者', coconuts });
        });
        players.sort((a, b) => b.coconuts - a.coconuts);
        const top = players.filter(p => p.coconuts > 0);
        if (top.length === 0) {
          list.innerHTML = '<div style="text-align:center;padding:24px;color:#f4e3b2;font-weight:700;">還沒有人收集椰子！</div>';
          return;
        }
        const medals = ['🥇','🥈','🥉'];
        list.innerHTML = top.map((p, i) => {
          const isMe = p.id === userId;
          const rank = i < 3 ? medals[i] : `${i+1}`;
          return `
            <div class="lb-row ${isMe ? 'lb-me' : ''}">
              <div class="lb-rank">${rank}</div>
              <div class="lb-name">${p.nickname}${isMe ? ' 👈' : ''}</div>
              <div class="lb-score">🥥 ${p.coconuts} 顆</div>
            </div>`;
        }).join('');
      } catch(e) {
        list.innerHTML = '<div style="text-align:center;color:#ff6666;font-weight:700;">載入失敗</div>';
      }
    };

    window.closeLeaderboard = function() {
      document.getElementById('lb-modal').classList.remove('active');
    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #1a1a2e;
      overflow-x: hidden;
    }

    /* ── 電腦版：3:2 比例容器，精準定位 ── */
    .scene {
      display: none; /* 預設隱藏，電腦才顯示 */
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2; /* 1536x1024 */
    }
    .scene img.bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 電腦版顯示 */
    @media (min-width: 600px) {
      .scene { display: block; }
      .mobile-scene { display: none; }
    }

    /* ── 手機版：直式圖，之後再設計 ── */
    .mobile-scene {
      position: relative;
      width: 100%;
    }
    .mobile-scene img.bg {
      width: 100%;
      height: auto;
      display: block;
    }
    .mobile-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5%;
    }

    /* ── 電腦版定位（百分比 = 像素位置 / 1536 or 1024）── */

    /* 標題：上方置中 */
    .pc-title {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }
    .pc-title h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(1.2rem, 2.5vw, 2.2rem);
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }
    .pc-title p {
      font-size: clamp(0.65rem, 1.2vw, 1rem);
      color: #f4e3b2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-top: 2px;
    }

    /* 椰子進度：左上 */
    .pc-coconut {
      position: absolute;
      top: 3%;
      left: 1%;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 8px 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
    }
    .pc-coconut .bar-title {
      font-size: 0.7vw;
      color: #f4e3b2;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .coconut-icons {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 2px;
    }
    .coconut-icon {
      font-size: 1.2vw;
      filter: grayscale(1) opacity(0.3);
      transition: all 0.4s;
    }
    .coconut-icon.earned {
      filter: none;
      animation: bounce-in 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    @keyframes bounce-in {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .coconut-progress-text {
      font-size: 0.65vw;
      color: #f4e3b2;
      text-align: center;
    }

    /* 故事按鈕：中間沙灘 left:35% top:45% */
    /* 左側面板：猴子三列 */
    .pc-left-panel {
      position: absolute;
      top: 55%;
      left: 3%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    /* 故事按鈕：標題正下方置中 */
    .pc-story {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
    }
    .pc-story img {
      width: 18vw;
      max-width: 240px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
      transition: transform 0.15s;
      cursor: pointer;
    }
    .pc-story img:active { transform: scale(0.95); }

    /* 三隻猴子一排 */
    .pc-monkey-row {
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }

    /* Banu：山洞口，往左調 */
    .pc-banu {
      position: absolute;
      top: 35%;
      right: 8%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 猴子共用 */
    .monkey-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: transform 0.15s;
      cursor: pointer;
    }
    .monkey-btn:active { transform: scale(0.92); }
    .monkey-btn img {
      width: 15vw;
      max-width: 200px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
    }
    .monkey-tag {
      margin-top: 4px;
      background: rgba(0,0,0,0.65);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8vw;
      font-weight: 700;
      color: white;
      white-space: nowrap;
    }

    /* Banu 按鈕 */
    .banu-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: transform 0.15s;
    }
    .banu-btn.locked { opacity: 0.65; cursor: not-allowed; }
    .banu-btn:not(.locked):active { transform: scale(0.95); }
    .banu-btn img {
      width: 10vw;
      max-width: 150px;
      filter: drop-shadow(0 4px 20px rgba(255,80,0,0.5));
    }
    .banu-tag {
      margin-top: 3px;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.65vw;
      font-weight: 700;
      color: #f4e3b2;
      white-space: nowrap;
    }

    .weapon-item {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px; padding: 4px 10px;
      transition: all 0.3s;
    }
    .weapon-item.item-ready {
      background: rgba(82,183,136,0.22);
      border-color: rgba(82,183,136,0.6);
    }
    .weapon-item.weapon-soon { opacity: 0.5; }
    .weapon-icon { font-size: 1.3vw; }
    .weapon-count { font-size: 0.7vw; font-weight: 900; color: #f4e3b2; }
    .weapon-item.item-ready .weapon-count { color: #52b788; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.3s; }

    /* ── 手機版樣式 ── */
    .mobile-title {
      font-family: 'Baloo 2', cursive;
      font-size: 1.4rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      text-align: center;
    }
    .mobile-subtitle {
      font-size: 0.75rem;
      color: #f4e3b2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin-top: 2px;
      text-align: center;
    }
    .mobile-coconut {
      margin-top: 10px;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 8px 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      text-align: center;
      width: 75%;
    }
    .mobile-coconut .bar-title {
      font-size: 0.7rem;
      color: #f4e3b2;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .mobile-coconut .coconut-icon { font-size: 1.3rem; }
    .mobile-coconut .coconut-progress-text { font-size: 0.65rem; }

    /* 狀態列 */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .status-user {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f4e3b2;
    }
    .status-coconut {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f4e3b2;
    }
    .status-back {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      transition: all 0.2s;
    }
    .status-back:hover { background: rgba(255,255,255,0.1); }
    .status-lb {
      font-size: 0.8rem;
      font-weight: 700;
      color: #ffd700;
      cursor: pointer;
      padding: 4px 10px;
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 20px;
      background: rgba(255,215,0,0.08);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .status-lb:hover { background: rgba(255,215,0,0.18); }

    /* ── 排行榜 Modal ── */
    .lb-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.75);
      align-items: center; justify-content: center;
    }
    .lb-overlay.active { display: flex; }
    .lb-box {
      background: linear-gradient(160deg, #1a3a2a, #0d2218);
      border: 1.5px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 28px 24px;
      width: 92%; max-width: 400px;
      max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .lb-title {
      font-family: 'Baloo 2', cursive;
      font-size: 1.3rem; font-weight: 800;
      color: #ffd700; text-align: center;
      margin-bottom: 16px;
    }
    .lb-list {
      overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 8px;
    }
    .lb-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 10px 14px;
    }
    .lb-row.lb-me {
      background: rgba(255,215,0,0.12);
      border-color: rgba(255,215,0,0.4);
    }
    .lb-rank { font-size: 1.1rem; min-width: 28px; text-align: center; }
    .lb-name { flex: 1; font-size: 0.9rem; font-weight: 700; color: #f4e3b2; }
    .lb-score { font-size: 0.9rem; font-weight: 900; color: #ffd700; white-space: nowrap; }
    .lb-close {
      margin-top: 16px; width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 10px;
      color: white; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      transition: background 0.2s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>

<!-- ── 電腦版 ── -->
<div class="scene">
  <img class="bg" src="https://nuniverseland.github.io/nunuquest/assets/danang/header_desktop.png" alt="峴港">

  <!-- 狀態列 -->
  <div class="status-bar">
    <a href="../index.html" class="status-back">← 回地圖</a>
    <div class="status-user" id="statusUser">🐒 冒險者</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-coconut" id="statusCoconut">🥥 0 顆</div>
      <button class="status-lb" onclick="showLeaderboard()">🏆 排行榜</button>
    </div>
  </div>

  <!-- 標題 -->
  <div class="pc-title">
    <h1>🐒 峴港保衛戰</h1>
    <p>收集壞猴武器，挑戰 Banu！</p>
  </div>

  <!-- 道具進度 -->
  <div class="pc-coconut">
    <div class="bar-title">集滿壞猴武器，挑戰 Banu！</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:6px;">
      <div class="weapon-item" id="pc-stoneItem">
        <span class="weapon-icon">🪨</span>
        <span class="weapon-count" id="pc-stoneCount">0</span>
      </div>
      <div class="weapon-item" id="pc-micItem">
        <span class="weapon-icon">🎤</span>
        <span class="weapon-count" id="pc-micCount">0</span>
      </div>
      <div class="weapon-item weapon-soon">
        <span class="weapon-icon">🐟</span>
        <span class="weapon-count" style="font-size:0.55vw;opacity:0.55;">即將推出</span>
      </div>
    </div>
  </div>

  <!-- 故事按鈕：標題正下方 -->
  <div class="pc-story">
    <a href="story.html" style="display:flex;flex-direction:column;align-items:center;text-decoration:none;">
      <img src="https://nuniverseland.github.io/nunuquest/assets/danang/btn_story.png" alt="故事篇章">
      <div class="banu-tag" style="margin-top:6px;">📖 猴子的故事</div>
    </a>
  </div>

  <!-- 三隻猴子：左下沙灘 -->
  <div class="pc-left-panel">
    <div class="pc-monkey-row">
      <a href="battle_stone.html" class="monkey-btn">
        <img src="https://nuniverseland.github.io/nunuquest/assets/danang/monkey_stone.png" alt="石頭猴">
        <div class="monkey-tag">石頭猴 🪨×1</div>
      </a>
      <a href="battle_loud.html" class="monkey-btn">
        <img src="https://nuniverseland.github.io/nunuquest/assets/danang/monkey_loud.png" alt="嘴砲猴">
        <div class="monkey-tag">嘴砲猴 🎤×1</div>
      </a>
      <div class="monkey-btn" style="opacity:0.45;cursor:not-allowed;">
        <img src="https://nuniverseland.github.io/nunuquest/assets/danang/monkey_sneaky.png" alt="壞心眼猴">
        <div class="monkey-tag">壞心眼猴 🔜</div>
      </div>
    </div>
  </div>

  <!-- Banu：山洞口 -->
  <div class="pc-banu" id="pc-banuSection">
    <a href="battle_banu.html" class="banu-btn locked" id="pc-banuBtn">
      <img src="https://nuniverseland.github.io/nunuquest/assets/danang/banu.png" alt="Banu">
      <div class="banu-tag" id="pc-banuNeeded">🔒 還需要 5 顆椰子</div>
    </a>
  </div>
</div>

<!-- ── 手機版（暫時簡單版，之後再設計）── -->
<div class="mobile-scene">
  <img class="bg" src="https://nuniverseland.github.io/nunuquest/assets/danang/header_mobile.png" alt="峴港">
  <div class="mobile-overlay">
    <div class="mobile-title">🐒 峴港保衛戰</div>
    <div class="mobile-subtitle">椰子收集限時活動 🥥</div>
    <div class="mobile-coconut">
      <div class="bar-title">🥥 集滿5顆挑戰Banu！</div>
      <div class="coconut-icons">
        <span class="coconut-icon" id="m-c1">🥥</span>
        <span class="coconut-icon" id="m-c2">🥥</span>
        <span class="coconut-icon" id="m-c3">🥥</span>
        <span class="coconut-icon" id="m-c4">🥥</span>
        <span class="coconut-icon" id="m-c5">🥥</span>
      </div>
      <div class="coconut-progress-text" id="m-coconutText">0 / 5 顆</div>
    </div>
  </div>
</div>


<!-- ── 排行榜 Modal ── -->
<div class="lb-overlay" id="lb-modal" onclick="if(event.target===this)closeLeaderboard()">
  <div class="lb-box">
    <div class="lb-title">🏆 椰子排行榜</div>
    <div class="lb-list" id="lb-list">
      <div style="text-align:center;padding:20px;color:#f4e3b2;font-weight:700;">載入中…</div>
    </div>
    <button class="lb-close" onclick="closeLeaderboard()">關閉</button>
  </div>
</div>

</body>
</html>
